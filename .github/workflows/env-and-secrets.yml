name: Environment Variables and Secrets
on: [workflow_dispatch]

env:
  AWS_REGION: us-east-1
  ENVIRONMENT: production

jobs:
  deploy-to-aws:
    runs-on: ubuntu-latest
    env:
      DEPLOYMENT_NAME: ecoretrofit-app
    steps:
      - name: Print Workflow Env Variables
        run: |
          echo "Deploying to region: $AWS_REGION"
          echo "Target environment: $ENVIRONMENT"
          
      - name: Access AWS Credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "Using Access Key: $AWS_ACCESS_KEY_ID"
          echo "Using Secret Key: $AWS_SECRET_ACCESS_KEY"
          
      - name: Set and Use Step-Level Variable
        run: |
          STEP_VAR="Build-1042"
          echo "Current Step ID: $STEP_VAR"
          echo "Deployment Name: $DEPLOYMENT_NAME"